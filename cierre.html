<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Cierre Especial - Sincronización Final</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@300;600&display=swap');
    
    body { margin: 0; overflow: hidden; background: #000; }
    
    /* Capa de créditos holográficos */
    #credits-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, rgba(0,240,255,0.05) 0%, rgba(0,0,0,1) 80%);
      color: white;
      text-align: center;
      font-family: 'Rajdhani', sans-serif;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      color: #00f0ff;
      text-shadow: 0 0 20px #00f0ff;
      margin-bottom: 10px;
      animation: fadeIn 3s ease-in;
    }

    .subtitle { font-size: 1.2rem; letter-spacing: 4px; opacity: 0.8; margin-bottom: 50px; }

    .credit-line { font-size: 1.1rem; margin: 10px 0; opacity: 0; animation: fadeInUp 2s forwards; }

    .btn-exit {
      pointer-events: auto;
      margin-top: 40px;
      background: none;
      border: 1px solid #ffd700;
      color: #ffd700;
      padding: 10px 25px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      transition: 0.4s;
    }
    .btn-exit:hover { background: #ffd700; color: #000; box-shadow: 0 0 20px #ffd700; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="credits-overlay">
    <div class="title">RESTAURADORES DEL APRENDIZAJE</div>
    <div class="subtitle">Sincronización de Mundos Completada</div>
    
    <div class="credit-line" style="animation-delay: 2s;">Diseño y Desarrollo: <b>Luis</b></div>
    <div class="credit-line" style="animation-delay: 4s;">Concepto Pedagógico: <b>Gamificación Inmersiva</b></div>
    <div class="credit-line" style="animation-delay: 6s;">Tecnologías: <b>A-Frame, WebXR & HTML5</b></div>
    <div class="credit-line" style="animation-delay: 8s;">"Restaurar el asombro para transformar la educación."</div>

    <button class="btn-exit" onclick="window.location.href='index.html'" 
            style="animation-delay: 10s; opacity:0; animation: fadeIn 2s forwards 10s;">
      REINICIAR SISTEMA
    </button>
  </div>

  <a-scene vr-mode-ui="enabled: false">
    <a-sky color="#050510"></a-sky>
    
    <a-entity position="0 1.5 -5">
      <a-dodecahedron color="#00f0ff" radius="1.5" material="wireframe: true;"
                      animation="property: rotation; to: 360 360 0; dur: 20000; loop: true; easing: linear">
      </a-dodecahedron>
      
      <a-dodecahedron color="#bd00ff" radius="0.8"
                      animation="property: rotation; to: -360 0 360; dur: 15000; loop: true; easing: linear">
      </a-dodecahedron>
      
      <a-light type="point" color="#00f0ff" intensity="2" distance="10"></a-light>
    </a-entity>

    <a-entity id="particles">
      <script>
        for (let i = 0; i < 60; i++) {
          let p = document.createElement('a-sphere');
          p.setAttribute('color', Math.random() > 0.5 ? '#00f0ff' : '#ffd700');
          p.setAttribute('radius', '0.02');
          let x = (Math.random() - 0.5) * 25;
          let y = (Math.random() - 0.5) * 15;
          let z = (Math.random() - 0.5) * 25;
          p.setAttribute('position', `${x} ${y} ${z}`);
          p.setAttribute('animation', `property: position; to: ${x} ${y + 1} ${z}; dir: alternate; dur: ${3000 + Math.random()*4000}; loop: true; easing: easeInOutQuad`);
          document.querySelector('a-scene').appendChild(p);
        }
      </script>
    </a-entity>

    <a-entity position="0 0 0" animation="property: rotation; to: 0 360 0; dur: 60000; loop: true; easing: linear">
      <a-camera position="0 1.6 10" look-controls-enabled="false"></a-camera>
    </a-entity>
  </a-scene>

</body>
</html>
