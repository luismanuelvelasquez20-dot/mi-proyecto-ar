<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Fragmento: Desconexión - Restauradores RA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    
    <script src="data.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020005; font-family: 'Rajdhani', sans-serif; }

        /* HUD Narrativo */
        #status-hud {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            color: #bd00ff; font-family: 'Orbitron'; text-shadow: 0 0 10px #bd00ff;
            pointer-events: none;
        }

        #btn-back {
            position: fixed; top: 20px; right: 20px; z-index: 100; padding: 10px 20px;
            background: rgba(189, 0, 255, 0.1); border: 1px solid #bd00ff; color: #bd00ff;
            border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s;
        }
        #btn-back:hover { background: #bd00ff; color: #fff; box-shadow: 0 0 15px #bd00ff; }

        #joystick-zone { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 100; }

        /* Lore Box (Holograma Corrupto) */
        #lore-box {
            position: fixed; top: 50%; right: 40px; transform: translateY(-50%); width: 280px;
            background: rgba(10, 0, 20, 0.9); border-right: 5px solid #bd00ff;
            padding: 20px; color: #e0e0e0; border-radius: 10px 0 0 10px;
            display: none; animation: slideIn 0.4s ease-out; z-index: 90;
            box-shadow: -10px 0 20px rgba(189, 0, 255, 0.2);
        }
        @keyframes slideIn { from { transform: translate(100%, -50%); opacity: 0; } to { transform: translate(0, -50%); opacity: 1; } }
    </style>
</head>
<body>

    <div id="status-hud">
        <h2 style="margin:0;">ZONA: ABISMO-B (DESCONEXIÓN)</h2>
        <small>ADVERTENCIA: SEÑAL DE APRENDIZAJE DÉBIL</small>
    </div>

    <button id="btn-back" onclick="window.location.href='menu.html'">REGRESAR AL DASHBOARD</button>
    <div id="joystick-zone"></div>

    <div id="lore-box">
        <strong style="color:#bd00ff; font-family:'Orbitron'; font-size: 0.9rem;">REPORTE DE BRECHA</strong>
        <p id="lore-text" style="font-size: 1rem; line-height: 1.4; margin-top: 10px;">...</p>
    </div>

    <a-scene fog="type: exponential; color: #0a0015; density: 0.07" vr-mode-ui="enabled: false">
        
        <a-sky color="#050010"></a-sky>

        <a-grid position="0 0 0" rotation="-90 0 0" width="100" height="100" static-body material="color: #4b0082; opacity: 0.2; transparent: true;"></a-grid>

        <a-entity id="abismo-objetos">
            <script>
                const scene = document.querySelector('a-scene');
                for(let i=0; i<15; i++){
                    let obj = document.createElement('a-box');
                    let x = (Math.random() - 0.5) * 20;
                    let y = Math.random() * 5 + 1;
                    let z = (Math.random() - 0.5) * 20 - 10;
                    obj.setAttribute('position', `${x} ${y} ${z}`);
                    obj.setAttribute('width', Math.random() + 0.5);
                    obj.setAttribute('height', Math.random() + 0.5);
                    obj.setAttribute('depth', 0.2);
                    obj.setAttribute('color', '#1a0033');
                    obj.setAttribute('material', 'metalness: 0.8; roughness: 0.2');
                    obj.setAttribute('animation', `property: rotation; to: ${Math.random()*360} ${Math.random()*360} 0; loop: true; dur: ${Math.random()*5000 + 5000}`);
                    scene.appendChild(obj);
                }
            </script>
        </a-entity>

        <a-entity id="nodo-final" position="0 1.5 -15">
            <a-torus-knot radius="0.6" radius-tubular="0.05" color="#bd00ff" 
                          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-torus-knot>
            <a-light type="point" color="#bd00ff" intensity="2" distance="10"></a-light>
            <a-text value="RECONECTAR" position="0 1.2 0" align="center" width="5" color="#bd00ff" font="orbitron"></a-text>
        </a-entity>

        <a-cylinder position="5 0 -10" radius="0.01" height="50" color="#bd00ff" rotation="90 45 0" opacity="0.3"></a-cylinder>
        <a-cylinder position="-5 0 -10" radius="0.01" height="50" color="#bd00ff" rotation="90 -45 0" opacity="0.3"></a-cylinder>

        <a-entity id="rig" position="0 0 5">
            <a-camera id="camera" look-controls="pointerLockEnabled: false"></a-camera>
        </a-entity>

    </a-scene>

    <script>
        // Configuración del Joystick
        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static', position: {left: '60px', bottom: '60px'},
            color: '#bd00ff', size: 100
        });

        const rig = document.getElementById('rig');
        const camera = document.getElementById('camera');
        let moveX = 0, moveZ = 0;

        manager.on('move', (evt, data) => {
            const rotY = camera.getAttribute('rotation').y * Math.PI / 180;
            moveX = (data.vector.x * Math.cos(rotY) - data.vector.y * Math.sin(rotY)) * 0.12;
            moveZ = (-data.vector.x * Math.sin(rotY) - data.vector.y * Math.cos(rotY)) * 0.12;
        });
        manager.on('end', () => { moveX = 0; moveZ = 0; });

        // Mensajes de Lore para la Desconexión
        const puntosDeBrecha = [
            { pos: {x: 0, z: 2}, texto: "La tecnología sin propósito es solo un adorno costoso en el aula." },
            { pos: {x: 0, z: -5}, texto: "Millones de dispositivos están encendidos, pero la curiosidad sigue apagada." },
            { pos: {x: 0, z: -10}, texto: "La verdadera desconexión ocurre cuando el sistema ignora el lenguaje digital de sus estudiantes." }
        ];

        function gameLoop() {
            const pos = rig.getAttribute('position');
            pos.x += moveX; pos.z += moveZ;
            rig.setAttribute('position', pos);

            // Mostrar Lore según cercanía
            let cercaDePunto = false;
            puntosDeBrecha.forEach(p => {
                const dist = Math.hypot(pos.x - p.pos.x, pos.z - p.pos.z);
                if(dist < 3.5) {
                    document.getElementById("lore-text").innerText = p.texto;
                    document.getElementById("lore-box").style.display = "block";
                    cercaDePunto = true;
                }
            });
            if(!cercaDePunto) document.getElementById("lore-box").style.display = "none";

            // Verificar llegada al Nodo Final
            const distFinal = Math.hypot(pos.x, pos.z + 15);
            if(distFinal < 1.5) {
                // Registrar descubrimiento (usando la función de tu data.js si quieres)
                if(typeof registrarAvanceGlobal === "function") {
                    registrarAvanceGlobal(null, null, 250, "Misión Desconexión: Entendiendo la brecha digital.");
                }
                alert("NODO RECONECTADO: Has entendido el origen de la brecha. Regresando al Dashboard.");
                window.location.href = 'menu.html';
            }

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
