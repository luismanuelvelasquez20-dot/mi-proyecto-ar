<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 1 - Esferas de Aprendizaje</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse; interval: 10" raycaster="objects: .clickable">
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#0a0a0a"></a-sky> 

      <a-light type="ambient" color="#FFF" intensity="0.6"></a-light>
      <a-light type="directional" position="-1 3 1" intensity="0.5"></a-light>

      <a-text id="instrucciones" 
              value="Toca al Avatar para iniciar la mision" 
              font="roboto" 
              position="0 3 -2.5" 
              align="center" 
              color="#FFD700" 
              width="4.5">
      </a-text>

      <a-text id="marcador" 
              value="Puntos: 0" 
              font="roboto" 
              position="0 2.5 -2.2" 
              align="center" 
              color="#FFF" 
              width="3">
      </a-text>

      <a-entity id="avatarEntity"
                class="clickable"
                gltf-model="#avatar" 
                position="0 0 -2.5" 
                scale="1.2 1.2 1.2">
      </a-entity>

      <a-sphere id="pieza1" 
                class="clickable"
                position="1.5 1.2 -2" 
                radius="0.2" 
                color="#FFD700" 
                visible="false">
      </a-sphere>

      <a-box id="botonSiguiente" 
             class="clickable"
             position="0 -5 -2" 
             width="1.3" height="0.35" depth="0.1" 
             color="#3B82F6" 
             visible="false">
          <a-text value="AVANZAR NIVEL 2" align="center" position="0 0 0.06" width="2.5" color="white" font="roboto"></a-text>
      </a-box>

      <a-camera position="0 1.6 0">
        <a-cursor visible="false" raycaster="objects: .clickable"></a-cursor>
      </a-camera>
    </a-scene>

    <script>
      let puntos = 0;
      const avatar = document.querySelector('#avatarEntity');
      const pieza = document.querySelector('#pieza1');
      const botonSiguiente = document.querySelector('#botonSiguiente');

      avatar.addEventListener('click', function() {
        document.querySelector('#instrucciones').setAttribute('value', '¡Mision Iniciada! Toca la esfera dorada');
        pieza.setAttribute('visible', 'true');
      });

      pieza.addEventListener('click', function() {
        puntos += 10;
        document.querySelector('#marcador').setAttribute('value', 'Puntos: ' + puntos);
        
        if (puntos >= 50) {
          document.querySelector('#instrucciones').setAttribute('value', '¡LOGRADO! Toca el boton para avanzar');
          pieza.setAttribute('visible', 'false');
          pieza.classList.remove('clickable'); // Deja de ser cliqueable
          
          botonSiguiente.setAttribute('visible', 'true');
          botonSiguiente.setAttribute('position', '0 0.6 -1.5'); 
        } else {
          let nuevaX = (Math.random() * 1.8) - 0.9;
          let nuevaY = (Math.random() * 1.2) + 0.8;
          let nuevaZ = (Math.random() * -1) - 1.3;
          pieza.setAttribute('position', `${nuevaX} ${nuevaY} ${nuevaZ}`);
        }
      });

      botonSiguiente.addEventListener('click', function() {
        window.location.href = "escena2.html";
      });
    </script>
  </body>
</html>
