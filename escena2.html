<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 2 - Teoría y Gestión</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" cursor="rayOrigin: mouse">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#0f0f14"></a-sky> 

      <a-text value="NIVEL 2: MARCO TEORICO" 
              font="roboto"
              position="0 3.2 -3" 
              align="center" 
              color="#FFD700" 
              width="5">
      </a-text>

      <a-entity gltf-model="#avatar" 
                position="0 0 -3" 
                scale="1.3 1.3 1.3"
                animation-mixer="clip: *">
      </a-entity>

      <a-box position="-1.8 1.5 -2.5" width="1" height="0.6" depth="0.1" color="#4F7CAC" onclick="mostrarDetalle('1')">
        <a-text value="MECANICAS" align="center" position="0 0 0.06" width="3.5" color="white" font="roboto"></a-text>
      </a-box>

      <a-box position="1.8 1.5 -2.5" width="1" height="0.6" depth="0.1" color="#C084FC" onclick="mostrarDetalle('2')">
        <a-text value="INMERSION" align="center" position="0 0 0.06" width="3.5" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="panelDetalle" 
             position="0 1.5 -1.5" 
             width="2.5" height="1.8" depth="0.1" 
             color="#111" 
             visible="false"
             onclick="cerrarDetalle()">
          
          <a-text id="textoDetalleTitle" 
                  value="DETALLE" 
                  align="center" 
                  position="0 0.6 0.06" 
                  font="roboto" 
                  wrap-count="20" 
                  color="#FFD700"
                  width="2.2"></a-text>

          <a-text id="textoDetalleBody" 
                  value="..." 
                  align="center" 
                  position="0 -0.1 0.06" 
                  font="roboto" 
                  wrap-count="28" 
                  color="#FFF"
                  width="2.2"></a-text>

          <a-text value="[ Toca para cerrar ]" 
                  align="center" 
                  position="0 -0.7 0.06" 
                  font="roboto" 
                  wrap-count="25" 
                  color="#BBB"
                  width="2.2"></a-text>
      </a-box>

      <a-box id="botonVolver" position="-0.8 0.5 -1.8" width="1.2" height="0.4" depth="0.1" color="#FF4444" onclick="window.location.href='index.html'">
          <a-text value="VOLVER A JUGAR" align="center" position="0 0 0.06" width="2.5" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="botonNivel3" position="0.8 0.5 -1.8" width="1.2" height="0.4" depth="0.1" color="#4CAF50" onclick="window.location.href='escena3.html'">
          <a-text value="SIGUIENTE" align="center" position="0 0 0.06" width="2.5" color="white" font="roboto"></a-text>
      </a-box>

      <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.5" position="-0.5 1 1"></a-light>
      
      <a-camera position="0 1.6 0">
        <a-cursor color="yellow"></a-cursor>
      </a-camera>
    </a-scene>

    <script>
      const info1 = {
        titulo: "MECANICAS DE JUEGO",
        cuerpo: "El uso de puntos y retos\nen la escena aumenta la\nmotivacion, manteniendo al\nestudiante enfocado."
      };

      const info2 = {
        titulo: "INMERSION 3D",
        cuerpo: "Los avatares crean una\nconexion emocional que\nfacilitat el aprendizaje\nsignificativo."
      };

      function mostrarDetalle(id) {
        const panel = document.querySelector('#panelDetalle');
        const titulo = document.querySelector('#textoDetalleTitle');
        const cuerpo = document.querySelector('#textoDetalleBody');

        if (id === '1') {
          titulo.setAttribute('value', info1.titulo);
          cuerpo.setAttribute('value', info1.cuerpo);
        } else if (id === '2') {
          titulo.setAttribute('value', info2.titulo);
          cuerpo.setAttribute('value', info2.cuerpo);
        }

        panel.setAttribute('visible', 'true');
        
        // Escondemos os botões para não se misturarem com o painel aberto
        document.querySelector('#botonVolver').setAttribute('visible', 'false');
        document.querySelector('#botonNivel3').setAttribute('visible', 'false');
      }

      function cerrarDetalle() {
        document.querySelector('#panelDetalle').setAttribute('visible', 'false');
        
        // Voltamos a mostrar os botões ao fechar
        document.querySelector('#botonVolver').setAttribute('visible', 'true');
        document.querySelector('#botonNivel3').setAttribute('visible', 'true');
      }
    </script>
  </body>
</html>
