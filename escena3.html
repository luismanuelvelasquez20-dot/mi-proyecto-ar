<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Nivel 3 - El Acertijo</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script>
      // Componente ultra-sencillo para mover la palabra
      AFRAME.registerComponent('movible', {
        init: function () {
          this.grabbed = false;
          
          // Al hacer clic (o tocar en celular)
          this.el.addEventListener('mousedown', () => { this.grabbed = true; });
          
          // Al soltar el clic
          window.addEventListener('mouseup', () => { 
            if(this.grabbed) {
              this.grabbed = false;
              checkWin(); // Verificamos si ganó
            }
          });

          // Mientras movemos el mouse
          window.addEventListener('mousemove', (e) => {
            if (this.grabbed) {
              // Obtenemos la posición actual
              let pos = this.el.getAttribute('position');
              // Multiplicamos por un factor pequeño para que el movimiento sea suave
              pos.x += e.movementX * 0.01;
              pos.y -= e.movementY * 0.01;
              this.el.setAttribute('position', pos);
            }
          });
        }
      });

      function checkWin() {
        const palabra = document.querySelector('#palabraMagica').object3D.position;
        // Si la palabra está cerca del centro (donde está el avatar)
        if (palabra.x > -1.5 && palabra.x < 1.5 && palabra.y > 0 && palabra.y < 2.5) {
            document.querySelector('#pista').setAttribute('value', '¡INCREÍBLE! Pensamiento lateral activado.');
            document.querySelector('#pista').setAttribute('color', '#00FF00');
            document.querySelector('#fondo').setAttribute('color', '#004d00'); // Fondo verde victoria
            
            // Efecto: El avatar se vuelve gigante de la emoción
            document.querySelector('#avatarEntity').setAttribute('animation', 'property: scale; to: 2.5 2.5 2.5; dur: 1000');
        }
      }
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" cursor="rayOrigin: mouse">
      <a-assets>
        <a-asset-item id="mi_avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

    <//a-sky id="fondo" color="#050505"><//a-sky>

      <a-text id="pista" 
              value="Para pasar, el avatar debe ser VERDE" 
              position="0 3.5 -3" align="center" width="5" font="roboto"></a-text>

      <a-entity id="palabraMagica" position="1.2 3.5 -2.9" movible>
             <a-text value="VERDE" color="#00FF00" align="center" scale="2.5 2.5 2.5"></a-text>
             <a-box opacity="0" width="0.8" height="0.4" depth="0.1"></a-box>
      </a-entity>

      <a-entity id="avatarEntity"
                gltf-model="#mi_avatar" 
                position="0 0 -4" 
                scale="1.5 1.5 1.5"
                animation-mixer="clip: *">
      </a-entity>

      <a-camera look-controls-enabled="false">
        <a-cursor color="yellow" visible="false"></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
