<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Nivel 3 - El Acertijo</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script>
      AFRAME.registerComponent('movible', {
        init: function () {
          this.grabbed = false;
          
          this.el.addEventListener('mousedown', () => { this.grabbed = true; });
          
          window.addEventListener('mouseup', () => { 
            if(this.grabbed) {
              this.grabbed = false;
              checkWin();
            }
          });

          window.addEventListener('mousemove', (e) => {
            if (this.grabbed) {
              let pos = this.el.getAttribute('position');
              pos.x += e.movementX * 0.008; // Suavizado para arrastrar con el dedo
              pos.y -= e.movementY * 0.008;
              this.el.setAttribute('position', pos);
            }
          });
        }
      });

      function checkWin() {
        const palabra = document.querySelector('#palabraMagica').object3D.position;
        // Si el usuario arrastra la palabra verde sobre el avatar
        if (palabra.x > -1.2 && palabra.x < 1.2 && palabra.y > 0 && palabra.y < 2.5) {
            document.querySelector('#pistaBase').setAttribute('value', '¡INCREIBLE! Pensamiento lateral activado.');
            document.querySelector('#pistaBase').setAttribute('color', '#00FF00');
            document.querySelector('#pistaBase').setAttribute('align', 'center');
            document.querySelector('#pistaBase').setAttribute('position', '0 2.2 -2');
            
            document.querySelector('#palabraMagica').setAttribute('visible', 'false');
            document.querySelector('#fondo').setAttribute('color', '#004d00');
            
            document.querySelector('#avatarEntity').setAttribute('animation', 'property: scale; to: 1.8 1.8 1.8; dur: 1000');
            
            setTimeout(() => {
                alert("¡Has desbloqueado el desafío final!");
                window.location.href = "escena4.html";
            }, 2000);
        }
      }
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" 
             cursor="rayOrigin: mouse; interval: 10"
             device-orientation-permission-ui="enabled: false"
             vr-mode-ui="enabled: false">
             
      <a-assets>
        <a-asset-item id="mi_avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky id="fondo" color="#050505"></a-sky>

      <a-text id="pistaBase" 
              value="Haz que el avatar sea" 
              position="-1.1 2.2 -2" 
              align="left" 
              width="3.5" 
              font="roboto"
              color="#FFF">
      </a-text>

      <a-entity id="palabraMagica" position="0.7 2.2 -2" movible>
             <a-text value="VERDE" color="#00FF00" align="left" width="3.5" font="roboto"></a-text>
             <a-box opacity="0" width="0.8" height="0.3" depth="0.1" position="0.3 0 0"></a-box>
      </a-entity>

      <a-entity id="avatarEntity" 
                gltf-model="#mi_avatar" 
                position="0 0 -2.5" 
                scale="1.3 1.3 1.3" 
                animation-mixer="clip: *">
      </a-entity>

      <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.5" position="-0.5 1 1"></a-light>

      <a-camera position="0 1.6 0" 
                look-controls="magicWindowTrackingEnabled: true; touchEnabled: true">
      </a-camera>
    </a-scene>
  </body>
</html>
