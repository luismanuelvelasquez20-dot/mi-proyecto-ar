<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Nivel 3 - El Acertijo</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script>
      AFRAME.registerComponent('movible', {
        init: function () {
          this.grabbed = false;
          
          this.el.addEventListener('mousedown', () => { this.grabbed = true; });
          
          window.addEventListener('mouseup', () => { 
            if(this.grabbed) {
              this.grabbed = false;
              checkWin();
            }
          });

          window.addEventListener('mousemove', (e) => {
            if (this.grabbed) {
              let pos = this.el.getAttribute('position');
              pos.x += e.movementX * 0.01;
              pos.y -= e.movementY * 0.01;
              this.el.setAttribute('position', pos);
            }
          });
        }
      });

      function checkWin() {
        const palabra = document.querySelector('#palabraMagica').object3D.position;
        // Se soltar a palavra perto do centro (onde o avatar está no telemóvel)
        if (palabra.x > -1.5 && palabra.x < 1.5 && palabra.y > 0 && palabra.y < 2.5) {
            document.querySelector('#pista').setAttribute('value', '¡INCREÍBLE! Pensamiento lateral activado.');
            document.querySelector('#pista').setAttribute('color', '#00FF00');
            document.querySelector('#fondo').setAttribute('color', '#004d00');
            
            document.querySelector('#avatarEntity').setAttribute('animation', 'property: scale; to: 1.8 1.8 1.8; dur: 1000');
            
            setTimeout(() => {
                alert("¡Has desbloqueado el Desafío Final del módulo!");
                window.location.href = "escena4.html"; // <-- Apunta a la nueva escena
            }, 2000);
        }
      }
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" cursor="rayOrigin: mouse">
      <a-assets>
        <a-asset-item id="mi_avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky id="fondo" color="#050505"></a-sky>

      <a-text id="pista" value="Haz que el avatar sea VERDE" position="0 2 -2" align="center" width="4" font="roboto"></a-text>

      <a-entity id="palabraMagica" position="0.8 1.3 -1.8" movible>
             <a-text value="VERDE" color="#00FF00" align="center" scale="2 2 2" font="roboto"></a-text>
             <a-box opacity="0" width="0.8" height="0.4" depth="0.1"></a-box>
      </a-entity>

      <a-entity id="avatarEntity" 
                gltf-model="#mi_avatar" 
                position="0 0 -2.5" 
                scale="1.1 1.1 1.1"
                animation-mixer="clip: *">
      </a-entity>

      <a-camera position="0 1.6 0">
        <a-cursor color="yellow" visible="false"></a-cursor>
      </a-camera>
    </a-scene>
  </body>
</html>
