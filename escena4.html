<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 4 - Clasificación de Conceptos</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse; interval: 10" raycaster="objects: .clickable">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky id="fondo" color="#030008"></a-sky>

      <a-text id="indicacion" 
              value="NIVEL 4: CLASIFICA EL CONCEPTO" 
              font="roboto" 
              position="0 3.2 -2.5" 
              align="center" 
              color="#FFD700" 
              width="5"></a-text>

      <a-text id="pregunta" 
              value="¿Dónde va 'Puntos y Retos'?" 
              font="roboto" 
              position="0 2.5 -2.5" 
              align="center" 
              color="#FFF" 
              width="4"></a-text>

      <a-entity id="avatarJuez" 
                gltf-model="#avatar" 
                position="0 0 -3.8" 
                scale="1.3 1.3 1.3"
                animation-mixer="clip: *">
      </a-entity>

      <a-entity position="-1.5 1 -2">
        <a-box id="btnG" 
               class="clickable" 
               width="1.2" height="0.6" depth="0.2" 
               color="#4F7CAC"></a-box>
        <a-text value="GAMIFICACION" 
                align="center" 
                position="0 0 0.15" 
                width="3.5" 
                color="white" 
                font="roboto"></a-text>
      </a-entity>

      <a-entity position="1.5 1 -2">
        <a-box id="btnI" 
               class="clickable" 
               width="1.2" height="0.6" depth="0.2" 
               color="#C084FC"></a-box>
        <a-text value="INMERSION" 
                align="center" 
                position="0 0 0.15" 
                width="3.5" 
                color="white" 
                font="roboto"></a-text>
      </a-entity>

      <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
      
      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
      let fase = 1;

      // Usamos EventListeners en lugar de onclick para máxima compatibilidad móvil
      document.querySelector('#btnG').addEventListener('click', function() {
        validar('G');
      });

      document.querySelector('#btnI').addEventListener('click', function() {
        validar('I');
      });

      function validar(tipo) {
        if (fase === 1 && tipo === 'G') {
          document.querySelector('#pregunta').setAttribute('value', "¡Correcto! Siguiente...");
          document.querySelector('#pregunta').setAttribute('color', '#00FF00');
          fase = 2;
          siguientePregunta();
        } else if (fase === 2 && tipo === 'I') {
          completarDesafio();
        } else {
          document.querySelector('#pregunta').setAttribute('value', "¡Inténtalo de nuevo!");
          document.querySelector('#pregunta').setAttribute('color', '#FF0000');
          setTimeout(() => {
            document.querySelector('#pregunta').setAttribute('color', '#FFF');
            document.querySelector('#pregunta').setAttribute('value', fase === 1 ? "¿Dónde va 'Puntos y Retos'?" : "¿Dónde va 'Avatares Interactivos'?");
          }, 1000);
        }
      }

      function siguientePregunta() {
        setTimeout(() => {
          document.querySelector('#pregunta').setAttribute('value', "¿Dónde va 'Avatares Interactivos'?");
          document.querySelector('#pregunta').setAttribute('color', '#FFF');
        }, 1500);
      }

      function completarDesafio() {
        alert("¡Nivel 4 superado con éxito!");
        window.location.href = "escena5.html";
      }
    </script>
  </body>
</html>
