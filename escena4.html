<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 4 - Clasificación de Conceptos</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" cursor="rayOrigin: mouse">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky id="fondo" color="#030008"></a-sky>

      <a-light type="ambient" color="#FFF" intensity="0.6"></a-light>
      <a-light type="directional" color="#00FFCC" intensity="0.8" position="0 3 1"></a-light>

      <a-text id="indicacion" 
              value="NIVEL 4: CLASIFICA EL CONCEPTO" 
              font="roboto" 
              position="0 3 -2.5" 
              align="center" 
              color="#FFD700" 
              width="4.5">
      </a-text>

      <a-text id="pregunta" 
              value="¿Dónde va 'Puntos y Retos'?" 
              font="roboto" 
              position="0 2.2 -2.2" 
              align="center" 
              color="#FFF" 
              width="4">
      </a-text>

      <a-entity id="avatarJuez"
                gltf-model="#avatar" 
                position="0 0 -2.8" 
                scale="1.2 1.2 1.2"
                animation-mixer="clip: *">
      </a-entity>

      <a-box id="pedestalGamificacion" 
             position="-1.4 0.6 -2" 
             width="0.8" height="0.6" depth="0.6" 
             color="#4F7CAC" 
             onclick="responder('gamificacion')">
          <a-text value="GAMIFICACION\n(Tocar aquí)" align="center" position="0 0 0.31" width="2.2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="pedestalInmersion" 
             position="1.4 0.6 -2" 
             width="0.8" height="0.6" depth="0.6" 
             color="#C084FC" 
             onclick="responder('inmersion')">
          <a-text value="INMERSION 3D\n(Tocar aquí)" align="center" position="0 0 0.31" width="2.2" color="white" font="roboto"></a-text>
      </a-box>

      <a-ring id="portal" 
              position="0 1.2 -2.7" 
              radius-inner="0.7" 
              radius-outer="0.9" 
              color="#00FFCC" 
              visible="false"
              animation="property: rotation; to: 0 0 360; loop: true; dur: 4000; easing: linear">
          
          <a-box id="diploma" 
                 position="0 0 0.05" 
                 width="0.7" height="0.5" depth="0.05" 
                 color="#FFD700"
                 onclick="finalizarTodo()">
              <a-text value="CERTIFICADO\nPARCIAL" align="center" position="0 0 0.03" width="1.8" color="black" font="roboto"></a-text>
          </a-box>
      </a-ring>

      <a-camera position="0 1.6 0">
        <a-cursor color="yellow" visible="false"></a-cursor>
      </a-camera>
    </a-scene>

    <script>
      let fase = 1;

      function responder(seleccion) {
        if (fase === 1) {
          if (seleccion === 'gamificacion') {
            // Acierto 1: cambia la pregunta
            document.querySelector('#pregunta').setAttribute('value', "¿Dónde va 'Avatares Interactivos'?");
            document.querySelector('#pregunta').setAttribute('color', '#00FFCC');
            fase = 2;
          } else {
            intentarDeNuevo();
          }
        } else if (fase === 2) {
          if (seleccion === 'inmersion') {
            // Acierto 2: Fin del nivel
            completarDesafio();
          } else {
            intentarDeNuevo();
          }
        }
      }

      function intentarDeNuevo() {
        document.querySelector('#pregunta').setAttribute('value', "¡Incorrecto! Inténtalo de nuevo");
        document.querySelector('#pregunta').setAttribute('color', '#FF4444');
        setTimeout(() => {
          if (fase === 1) {
            document.querySelector('#pregunta').setAttribute('value', "¿Dónde va 'Puntos y Retos'?");
          } else {
            document.querySelector('#pregunta').setAttribute('value', "¿Dónde va 'Avatares Interactivos'?");
          }
          document.querySelector('#pregunta').setAttribute('color', '#FFF');
        }, 1500);
      }

      function completarDesafio() {
        // Ocultamos la interfaz de juego
        document.querySelector('#pregunta').setAttribute('visible', 'false');
        document.querySelector('#pedestalGamificacion').setAttribute('visible', 'false');
        document.querySelector('#pedestalInmersion').setAttribute('visible', 'false');

        // Modificamos el título
        document.querySelector('#indicacion').setAttribute('value', "¡DESAFIO DE CONCEPTOS SUPERADO!");
        document.querySelector('#indicacion').setAttribute('color', '#00FFCC');

        // Activamos el portal giratorio con el diploma
        document.querySelector('#portal').setAttribute('visible', 'true');
        
        // Pequeño brinco del avatar de la emoción
        document.querySelector('#avatarJuez').setAttribute('animation', 'property: scale; to: 1.4 1.4 1.4; dur: 400; dir: alternate; loop: 2');
      }

      function finalizarTodo() {
        alert("¡Conceptos clasificados! Avanzando al laberinto de la motivación...");
        window.location.href = "escena5.html"; // <-- Redirige al Nivel 5 
      }
    </script>
  </body>
</html>
