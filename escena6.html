<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 6 - El Buscador de Evidencias</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }
    </style>

    <script>
      // 1. SCRIPT ANTI-BLOQUEO: Fuerza detección móvil
      window.addEventListener('DOMContentLoaded', () => {
        if (AFRAME.utils && AFRAME.utils.device) {
          AFRAME.utils.device.isMobile = function() { return true; };
          AFRAME.utils.device.isTablet = function() { return false; };
        }
      });

      // 2. FORZAR PERMISO DE GIROSCOPIO AL PRIMER TOQUE
      window.addEventListener('click', function() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
              if (permissionState === 'granted') {
                var cameraEl = document.querySelector('a-camera');
                if (cameraEl) {
                  cameraEl.components['look-controls'].play();
                }
              }
            })
            .catch(console.error);
        }
      }, { once: true });
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" 
             cursor="rayOrigin: mouse; interval: 10"
             raycaster="objects: .clickable, a-sphere"
             device-orientation-permission-ui="enabled: false"
             vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky id="fondo" color="#02050a"></a-sky>

      <a-light type="ambient" color="#FFF" intensity="0.6"></a-light>
      <a-light type="directional" color="#00FFFF" intensity="0.7" position="1 3 1"></a-light>

      <a-text id="titulo" 
              value="NIVEL 6: BUSCADOR DE EVIDENCIAS" 
              font="roboto" 
              position="0 3.2 -2.5" 
              align="center" 
              color="#FFD700" 
              width="4.5">
      </a-text>

      <a-text id="indicaciones" 
              value="iexcl;Encuentra las 3 esferas de luz ocultas en el espacio!" 
              font="roboto" 
              position="0 2.5 -2.2" 
              align="center" 
              color="#FFF" 
              width="3.8">
      </a-text>

      <a-text id="contador" 
              value="Evidencias: 0 / 3" 
              font="roboto" 
              position="0 2.1 -2.2" 
              align="center" 
              color="#00FFCC" 
              width="3">
      </a-text>

      <a-entity id="avatarBuscador"
                gltf-model="#avatar" 
                position="0 0 -2.5" 
                scale="1.2 1.2 1.2"
                animation-mixer="clip: *">
      </a-entity>

      <a-sphere id="evidencia1" class="clickable"
                position="-1.5 1.8 -2" 
                radius="0.18" 
                color="#00FFFF" 
                onclick="recolectarEvidencia(1, 'iexcl;Evidencia 1: Mayor Retencion Visual!')"
                animation="property: position; to: -1.5 2.0 -2; dir: alternate; dur: 1200; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere id="evidencia2" class="clickable"
                position="1.5 1.0 -1.8" 
                radius="0.18" 
                color="#FF00FF" 
                onclick="recolectarEvidencia(2, 'iexcl;Evidencia 2: Aprendizaje Activo y Practico!')"
                animation="property: position; to: 1.5 0.8 -1.8; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere id="evidencia3" class="clickable"
                position="0 2.2 -3" 
                radius="0.18" 
                color="#FFD700" 
                onclick="recolectarEvidencia(3, 'iexcl;Evidencia 3: Motivacion e Interactividad!')"
                animation="property: position; to: 0 2.0 -3; dir: alternate; dur: 1800; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true">
        <a-cursor color="yellow" visible="false"></a-cursor>
      </a-camera>
    </a-scene>

    <script>
      let encontradas = 0;
      const totalEvidencias = 3;
      const registradas = { 1: false, 2: false, 3: false };

      function recolectarEvidencia(id, mensaje) {
        if (registradas[id]) return;

        registradas[id] = true;
        encontradas++;

        const esfera = document.querySelector('#evidencia' + id);
        esfera.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 400; easing: easeInQuad');
        setTimeout(() => {
          esfera.setAttribute('visible', 'false');
        }, 400);

        const textoIndicaciones = document.querySelector('#indicaciones');
        textoIndicaciones.setAttribute('value', mensaje);
        textoIndicaciones.setAttribute('color', '#00FFCC');

        document.querySelector('#contador').setAttribute('value', `Evidencias: ${encontradas} / ${totalEvidencias}`);

        if (encontradas < totalEvidencias) {
          setTimeout(() => {
            textoIndicaciones.setAttribute('value', 'iexcl;Sigue buscando las demas esferas!');
            textoIndicaciones.setAttribute('color', '#FFF');
          }, 2500);
        } else {
          completarNivel();
        }
      }

      function completarNivel() {
        const textoIndicaciones = document.querySelector('#indicaciones');
        textoIndicaciones.setAttribute('value', "iexcl;EXCELENTE TRABAJO! Evidencias recopiladas.");
        textoIndicaciones.setAttribute('color', '#FFD700');

        document.querySelector('#avatarBuscador').setAttribute('animation', 'property: scale; to: 1.4 1.4 1.4; dur: 500; dir: alternate; loop: 2');

        setTimeout(() => {
          alert("iexcl;Nivel 6 Completado con exito! Preparando el Nivel 7: El Quiz de Reflejos.");
          window.location.href = "escena7.html";
        }, 3000);
      }
    </script>
  </body>
</html>
