<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 8 - El Rompecabezas Final</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" cursor="rayOrigin: mouse">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky id="fondo" color="#020005"></a-sky>

      <a-light type="ambient" color="#FFF" intensity="0.6"></a-light>
      <a-light type="directional" color="#FFD700" intensity="0.8" position="0 3 1"></a-light>

      <a-text id="titulo" 
              value="NIVEL 8: EL ROMPECABEZAS" 
              font="roboto" 
              position="0 3.3 -2.5" 
              align="center" 
              color="#FFD700" 
              width="4.5">
      </a-text>

      <a-text id="indicaciones" 
              value="¡Toca las piezas para rotarlas y armar la imagen!" 
              font="roboto" 
              position="0 2.8 -2.2" 
              align="center" 
              color="#FFF" 
              width="3.8">
      </a-text>

      <a-entity id="avatarFinal"
                gltf-model="#avatar" 
                position="-1.5 0 -2.5" 
                scale="1.1 1.1 1.1"
                animation-mixer="clip: *">
      </a-entity>

      <a-entity id="contenedorPuzzle" position="0.6 1.3 -2" rotation="0 0 0">
          
          <a-plane class="pieza" position="-0.45  0.45 0" width="0.28" height="0.28" color="#FF5733" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position="-0.15  0.45 0" width="0.28" height="0.28" color="#33FF57" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.15  0.45 0" width="0.28" height="0.28" color="#3357FF" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.45  0.45 0" width="0.28" height="0.28" color="#F3FF33" onclick="rotarPieza(this)"></a-plane>

          <a-plane class="pieza" position="-0.45  0.15 0" width="0.28" height="0.28" color="#33FFF3" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position="-0.15  0.15 0" width="0.28" height="0.28" color="#FF33F3" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.15  0.15 0" width="0.28" height="0.28" color="#FFA833" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.45  0.15 0" width="0.28" height="0.28" color="#8D33FF" onclick="rotarPieza(this)"></a-plane>

          <a-plane class="pieza" position="-0.45 -0.15 0" width="0.28" height="0.28" color="#33FFA8" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position="-0.15 -0.15 0" width="0.28" height="0.28" color="#FF3333" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.15 -0.15 0" width="0.28" height="0.28" color="#33FF33" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.45 -0.15 0" width="0.28" height="0.28" color="#3333FF" onclick="rotarPieza(this)"></a-plane>

          <a-plane class="pieza" position="-0.45 -0.45 0" width="0.28" height="0.28" color="#FFFF33" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position="-0.15 -0.45 0" width="0.28" height="0.28" color="#FF33A8" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.15 -0.45 0" width="0.28" height="0.28" color="#33FFF0" onclick="rotarPieza(this)"></a-plane>
          <a-plane class="pieza" position=" 0.45 -0.45 0" width="0.28" height="0.28" color="#E033FF" onclick="rotarPieza(this)"></a-plane>

          <a-plane id="reversoCuadro" 
                   position="0 0 -0.02" 
                   rotation="0 180 0" 
                   width="1.3" height="1.3" 
                   color="#111" 
                   material="side: double">
              <a-text value="EL CONOCIMIENTO" 
                      align="center" 
                      position="0 0.3 0.05" 
                      width="2.5" 
                      color="#FFD700" 
                      font="roboto"></a-text>
              <a-text value="La letra con juego entra:\nEl juego no es el fin,\nes el camino para encender\nla curiosidad." 
                      align="center" 
                      position="0 -0.1 0.05" 
                      width="2.1" 
                      color="#FFF" 
                      font="roboto"
                      wrap-count="25"></a-text>
          </a-plane>
      </a-entity>

      <a-box id="botonVoltear" 
             position="0.6 -5 -2" 
             width="1" height="0.3" depth="0.1" 
             color="#4CAF50" 
             visible="false" 
             onclick="voltearMural()">
          <a-text value="VOLTEAR" align="center" position="0 0 0.06" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-camera position="0 1.6 0">
        <a-cursor color="yellow" visible="false"></a-cursor>
      </a-camera>
    </a-scene>

    <script>
      // Al iniciar el juego, rotamos de forma aleatoria las 16 piezas (90, 180, 270 grados)
      window.onload = () => {
        const piezas = document.querySelectorAll('.pieza');
        const angulos = [90, 180, 270];
        
        piezas.forEach(pieza => {
          const anguloAzar = angulos[Math.floor(Math.random() * angulos.length)];
          pieza.setAttribute('rotation', `0 0 ${anguloAzar}`);
        });
      };

      // Función para rotar cada pieza 90 grados al tocarla
      function rotarPieza(elemento) {
        let rotacionActual = elemento.getAttribute('rotation');
        let nuevoAngulo = (rotacionActual.z + 90) % 360;
        
        // Animamos la rotación de la pieza de forma fluida
        elemento.setAttribute('animation', {
          property: 'rotation',
          to: `0 0 ${nuevoAngulo}`,
          dur: 200,
          easing: 'easeOutQuad'
        });

        // Guardamos el nuevo valor directamente en el atributo tras rotar
        elemento.components.rotation.data.z = nuevoAngulo;

        verificarVictoria();
      }

      // Comprobar si todas las piezas están alineadas a 0 (o 360) grados
      function verificarVictoria() {
        const piezas = document.querySelectorAll('.pieza');
        let rompecabezasArmado = true;

        piezas.forEach(pieza => {
          let rotZ = Math.round(pieza.getAttribute('rotation').z) % 360;
          if (rotZ !== 0) {
            rompecabezasArmado = false;
          }
        });

        if (rompecabezasArmado) {
          document.querySelector('#indicaciones').setAttribute('value', "¡ROMPECABEZAS COMPLETADO!");
          document.querySelector('#indicaciones').setAttribute('color', '#00FFCC');

          // Hacemos aparecer el botón "Voltear" trayéndolo a la pantalla
          const btn = document.querySelector('#botonVoltear');
          btn.setAttribute('visible', 'true');
          btn.setAttribute('position', '0.6 0.4 -2');
        }
      }

      // Animación de rotación completa de 180 grados para ver la parte trasera
      function voltearMural() {
        const contenedor = document.querySelector('#contenedorPuzzle');
        contenedor.setAttribute('animation', 'property: rotation; to: 0 180 0; dur: 1500; easing: easeInOutQuad');

        // Ocultamos el botón para limpiar la interfaz
        document.querySelector('#botonVoltear').setAttribute('visible', 'false');
        document.querySelector('#indicaciones').setAttribute('value', "¡Felicidades, Maestrante!");
        document.querySelector('#indicaciones').setAttribute('color', '#FFD700');

        // El avatar salta de alegría
        document.querySelector('#avatarFinal').setAttribute('animation', 'property: position; to: -1.5 0.5 -2.5; dir: alternate; dur: 350; loop: 6');

        setTimeout(() => {
          alert("¡Felicidades! Has culminado el rompecabezas. Vamos a la reflexión final del curso.");
          window.location.href = "reflexion.html"; // <-- Redirige a la nueva escena de reflexión
        }, 5000);
      }
    </script>
  </body>
</html>
