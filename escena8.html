<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 8 - El Mural de los Sinónimos</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <script>
      // Componente para arrastrar las piezas con el dedo de forma fluida
      AFRAME.registerComponent('arrastrable', {
        init: function () {
          this.grabbed = false;
          this.el.addEventListener('mousedown', () => { this.grabbed = true; });
          
          window.addEventListener('mouseup', () => { 
            if(this.grabbed) {
              this.grabbed = false;
              verificarPieza(this.el);
            }
          });

          window.addEventListener('mousemove', (e) => {
            if (this.grabbed) {
              let pos = this.el.getAttribute('position');
              pos.x += e.movementX * 0.008;
              pos.y -= e.movementY * 0.008;
              this.el.setAttribute('position', pos);
            }
          });
        }
      });

      let piezasEncajadas = 0;
      const totalPiezas = 9;

      function verificarPieza(el) {
        const pos = el.object3D.position;
        const destX = parseFloat(el.getAttribute('data-x'));
        const destY = parseFloat(el.getAttribute('data-y'));

        // Margen de error flexible (0.35) para que encaje fácil con el dedo
        if (Math.abs(pos.x - destX) < 0.35 && Math.abs(pos.y - destY) < 0.35) {
          el.setAttribute('position', `${destX} ${destY} -2.15`);
          el.classList.remove('clickable');
          el.removeAttribute('arrastrable');
          el.setAttribute('color', '#10B981'); // Cambia a verde al encajar

          piezasEncajadas++;
          document.querySelector('#contador').setAttribute('value', `Progreso: ${piezasEncajadas} / 9`);
          
          if (piezasEncajadas >= totalPiezas) {
            girarMuralAutomatico();
          }
        }
      }

      function girarMuralAutomatico() {
        document.querySelector('#indicaciones').setAttribute('value', "¡MURAL COMPLETADO!");
        document.querySelector('#indicaciones').setAttribute('color', '#00FF66');
        document.querySelector('#contador').setAttribute('visible', 'false');

        // Ocultamos las 9 piezas inmediatamente para que no floten en el aire
        for (let i = 1; i <= 9; i++) {
          const pieza = document.querySelector(`#p${i}`);
          if (pieza) {
            pieza.setAttribute('visible', 'false');
          }
        }

        // Gira el muro 180 grados automáticamente (el botón final girará con él)
        const contenedor = document.querySelector('#contenedorPuzzle');
        contenedor.setAttribute('animation', 'property: rotation; to: 0 180 0; dur: 2000; easing: easeInOutQuad');
        
        // Al terminar de girar, ocultamos las indicaciones viejas del cielo
        setTimeout(() => {
          document.querySelector('#indicaciones').setAttribute('visible', 'false');
        }, 2100);
      }
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse; interval: 10" raycaster="objects: .clickable">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#03010a"></a-sky>

      <a-text id="indicaciones" value="Arrastra los sinonimos a su concepto correcto" position="0 3.6 -2.5" align="center" width="4" color="#FFD700" font="roboto"></a-text>
      <a-text id="contador" value="Progreso: 0 / 9" position="0 3.2 -2.5" align="center" width="3" color="#FFF" font="roboto"></a-text>

      <a-entity id="contenedorPuzzle" position="0 1.7 -2.2">
        <a-box width="3.2" height="2.6" depth="0.1" color="#1A1A24"></a-box>
        
        <a-text value="Gamificacion" position="-1.0 0.8 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        <a-text value="Inmersion" position="0 0.8 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        <a-text value="Feedback" position="1.0 0.8 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        
        <a-text value="Motivacion" position="-1.0 0 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        <a-text value="Avatar" position="0 0 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        <a-text value="Retos" position="1.0 0 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        
        <a-text value="Narrativa" position="-1.0 -0.8 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        <a-text value="Puntos" position="0 -0.8 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>
        <a-text value="Ranking" position="1.0 -0.8 0.07" align="center" width="2.5" color="#9CA3AF" font="roboto"></a-text>

        <a-text value="LA GAMIFICACION MAS LA\nREALIDAD AUMENTADA\nTRANSFORMAN EL APRENDIZAJE" 
                position="0 0.4 -0.07" 
                rotation="0 180 0" 
                align="center" 
                width="3" 
                color="#FFD700" 
                font="roboto">
        </a-text>

        <a-entity id="botonFinalizar" position="0 -0.7 -0.08" rotation="0 180 0">
          <a-box id="clickAreaFinalizar" class="clickable" width="1.2" height="0.4" depth="0.1" color="#EF4444"></a-box>
          <a-text value="FINALIZAR" align="center" position="0 0 0.06" width="3.2" color="white" font="roboto"></a-text>
        </a-entity>
      </a-entity>

      <a-box id="p1" class="clickable" arrastrable position="-1.4 0.6 -1.6" data-x="-1.0" data-y="2.5" width="0.7" height="0.3" depth="0.05" color="#4F7CAC">
        <a-text value="Ludificacion" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p2" class="clickable" arrastrable position="-0.7 0.6 -1.6" data-x="0" data-y="2.5" width="0.7" height="0.3" depth="0.05" color="#C084FC">
        <a-text value="Absorcion" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p3" class="clickable" arrastrable position="0 0.6 -1.6" data-x="1.0" data-y="2.5" width="0.7" height="0.3" depth="0.05" color="#3B82F6">
        <a-text value="Respuesta" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p4" class="clickable" arrastrable position="0.7 0.6 -1.6" data-x="-1.0" data-y="1.7" width="0.7" height="0.3" depth="0.05" color="#10B981">
        <a-text value="Estimulo" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p5" class="clickable" arrastrable position="1.4 0.6 -1.6" data-x="0" data-y="1.7" width="0.7" height="0.3" depth="0.05" color="#F59E0B">
        <a-text value="Identidad" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p6" class="clickable" arrastrable position="-1.4 0.2 -1.6" data-x="1.0" data-y="1.7" width="0.7" height="0.3" depth="0.05" color="#EC4899">
        <a-text value="Desafios" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p7" class="clickable" arrastrable position="-0.7 0.2 -1.6" data-x="-1.0" data-y="0.9" width="0.7" height="0.3" depth="0.05" color="#8B5CF6">
        <a-text value="Relato" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p8" class="clickable" arrastrable position="0.5 0.2 -1.6" data-x="0" data-y="0.9" width="0.7" height="0.3" depth="0.05" color="#EF4444">
        <a-text value="Recompensa" align="center" position="0 0 0.03" width="1.6" color="white" font="roboto"></a-text>
      </a-box>

      <a-box id="p9" class="clickable" arrastrable position="1.3 0.2 -1.6" data-x="1.0" data-y="0.9" width="0.7" height="0.3" depth="0.05" color="#14B8A6">
        <a-text value="Clasificar" align="center" position="0 0 0.03" width="2" color="white" font="roboto"></a-text>
      </a-box>

      <a-entity id="avatarFinal" gltf-model="#avatar" position="-2 0 -2.5" scale="1.1 1.1 1.1" animation-mixer="clip: *"></a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" intensity="0.4" position="-1 2 1"></a-light>
      
      <a-camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-camera>
    </a-scene>

    <script>
      // El click se asocia directamente a la caja física roja del botón
      document.querySelector('#clickAreaFinalizar').addEventListener('click', function() {
        alert("¡Felicidades! Has completado con éxito todos los niveles de la experiencia.");
        window.location.href = "reflexion.html";
      });
    </script>
  </body>
</html>
