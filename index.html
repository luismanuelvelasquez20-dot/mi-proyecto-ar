<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restauradores del Aprendizaje - Iniciar Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

    :root {
      --cyan: #00f0ff;
      --magenta: #bd00ff;
      --green: #00ffcc;
      --danger: #ff0055;
      --bg-dark: #020208;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 15px;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(189, 0, 255, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.18) 0%, transparent 40%),
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
      background-size: 100% 100%, 100% 100%, 100% 4px;
      color: #ffffff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CONTENEDOR CENTRAL - PANEL HOLOGRÁFICO */
    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(6, 6, 20, 0.95);
      border: 3px solid var(--cyan);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 
        0 0 35px rgba(0, 240, 255, 0.25), 
        inset 0 0 20px rgba(189, 0, 255, 0.15);
      text-align: center;
      position: relative;
    }

    .login-box::before {
      content: "";
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      background: linear-gradient(45deg, var(--cyan), var(--magenta));
      z-index: -1;
      border-radius: 18px;
      filter: blur(10px);
      opacity: 0.4;
    }

    /* TÍTULO DE IMPACTO */
    .brand-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 2px;
      background: linear-gradient(to right, #fff, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 5px 0;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }

    .brand-sub {
      font-size: 0.85rem;
      color: var(--cyan);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
      font-weight: bold;
    }

    /* ENTRADAS DE TEXTO ESTILO HUD */
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: #b0b0d0;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      display: block;
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      background: rgba(15, 15, 30, 0.8);
      border: 1px solid var(--panel-border, rgba(0, 240, 255, 0.3));
      border-radius: 6px;
      padding: 12px 15px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      color: #fff;
      font-weight: bold;
      letter-spacing: 1.5px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
      background: rgba(0, 240, 255, 0.05);
    }

    /* MENSAJE DE NOTIFICACIÓN */
    .alert-msg {
      font-size: 0.85rem;
      font-weight: bold;
      min-height: 20px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* BOTONES DE ACCIÓN */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #7209b7, #3f37c9);
      border: 1px solid var(--magenta);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 12px;
      border-radius: 6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(189, 0, 255, 0.4);
      margin-bottom: 12px;
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      box-shadow: 0 0 20px var(--cyan);
      border-color: #fff;
      transform: translateY(-2px);
    }

    .btn-register {
      background: transparent;
      border: 1px solid rgba(0, 255, 204, 0.4);
      color: var(--green);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 8px 15px;
      border-radius: 6px;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      letter-spacing: 1.5px;
    }

    .btn-register:hover {
      background: rgba(0, 255, 204, 0.1);
      box-shadow: 0 0 12px var(--green);
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1 class="brand-title">Restauradores</h1>
    <div class="brand-sub">Portal del Aprendizaje</div>

    <form id="loginForm" onsubmit="iniciarSesion(event)">
      <div class="input-group">
        <label for="username">Nombre de Héroe</label>
        <input type="text" id="username" class="input-field" required placeholder="Ingresa tu apodo">
      </div>

      <div class="input-group">
        <label for="password">Código de Entrada</label>
        <input type="password" id="password" class="input-field" required placeholder="Clave de acceso">
      </div>

      <div class="alert-msg" id="alertMsg"></div>

      <button type="submit" class="btn-submit">Sincronizar Portal</button>
      <button type="button" class="btn-register" onclick="crearRegistro()">Crear Nuevo Registro</button>
    </form>
  </div>

  <script src="progreso.js"></script>
  <script>
    const alertMsg = document.getElementById("alertMsg");

    function iniciarSesion(event) {
      event.preventDefault();
      const user = document.getElementById("username").value.trim().toLowerCase();
      const pass = document.getElementById("password").value;

      // Leer base de datos local
      const usuarios = JSON.parse(localStorage.getItem("usuarios_registrados")) || {};

      if (usuarios[user]) {
        if (usuarios[user].contrasena === pass) {
          alertMsg.style.color = "var(--green)";
          alertMsg.innerText = "ACCESO PERMITIDO. Sincronizando...";
          
          // Guardar sesión activa
          localStorage.setItem("usuarioActivo", user);

          // Redirigir al menú principal interactivo
          setTimeout(() => {
            window.location.href = "menu.html";
          }, 1200);
        } else {
          alertMsg.style.color = "var(--danger)";
          alertMsg.innerText = "CÓDIGO DE ENTRADA INCORRECTO.";
        }
      } else {
        alertMsg.style.color = "var(--danger)";
        alertMsg.innerText = "EL HÉROE NO ESTÁ REGISTRADO.";
      }
    }

    function crearRegistro() {
      const user = document.getElementById("username").value.trim().toLowerCase();
      const pass = document.getElementById("password").value;

      if (!user || !pass) {
        alertMsg.style.color = "var(--danger)";
        alertMsg.innerText = "Rellena los campos para registrarte.";
        return;
      }

      const usuarios = JSON.parse(localStorage.getItem("usuarios_registrados")) || {};

      if (usuarios[user]) {
        alertMsg.style.color = "var(--danger)";
        alertMsg.innerText = "Ese nombre de héroe ya existe.";
      } else {
        // Guardar nuevo registro
        usuarios[user] = { contrasena: pass };
        localStorage.setItem("usuarios_registrados", JSON.stringify(usuarios));
        
        alertMsg.style.color = "var(--green)";
        alertMsg.innerText = "¡HÉROE REGISTRADO! Pulsa Sincronizar.";
      }
    }
  </script>
</body>
</html>
