<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Nivel 1 - Introducción</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>

  <body>
    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local" cursor="rayOrigin: mouse">
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-light type="ambient" color="#FFF"></a-light>
      <a-light type="directional" position="-1 1 1" intensity="0.5"></a-light>
      
      <a-sky color="#0a0a0a"></a-sky> 

      <a-camera position="0 1.6 0">
        <a-cursor color="#FF0000"></a-cursor>
      </a-camera>

      <a-sphere id="pieza1" 
                position="2 1.2 -3" 
                radius="0.2" 
                color="#FFD700" 
                visible="false" 
                onclick="piezaEncontrada()">
      </a-sphere>

      <a-entity id="avatarEntity"
                gltf-model="#avatar" 
                position="0 0 -3" 
                scale="1.3 1.3 1.3"
                animation-mixer="clip: *">
      </a-entity>

      <a-text id="instrucciones" 
              value="Toca no avatar para iniciar a missão" 
              position="0 2.5 -2.8" 
              align="center" 
              color="#FFFFFF" 
              width="4"
              font="roboto">
      </a-text>

      <a-text id="marcador" 
              value="Puntos: 0" 
              position="-1.5 2.5 -2.8" 
              align="center" 
              color="#00FF00" 
              width="3"
              font="roboto">
      </a-text>

      <a-box id="botonCertificado" 
             position="0 -5 -2" 
             width="1.5" 
             height="0.5" 
             depth="0.1" 
             color="#4CAF50" 
             visible="false" 
             onclick="window.location.href='escena2.html'">
          <a-text value="AVANZAR NIVEL 2" align="center" position="0 0 0.06" width="3" color="white" font="roboto"></a-text>
      </a-box>

    </a-scene>

    <script>
      let puntos = 0;

      // Evento para iniciar o jogo ao tocar no Avatar
      document.querySelector('#avatarEntity').addEventListener('click', iniciarMision);

      function iniciarMision() {
          document.querySelector('#instrucciones').setAttribute('value', '¡Misión Iniciada! Busca la esfera');
          document.querySelector('#pieza1').setAttribute('visible', 'true');
      }

      function piezaEncontrada() {
          puntos += 10;
          document.querySelector('#marcador').setAttribute('value', 'Puntos: ' + puntos);
          
          if (puntos >= 50) {
              document.querySelector('#instrucciones').setAttribute('value', '¡LOGRADO! Toca avanzar');
              document.querySelector('#pieza1').setAttribute('visible', 'false');
              
              const btn = document.querySelector('#botonCertificado');
              btn.setAttribute('visible', 'true');
              btn.setAttribute('position', '0 1 -2'); 
          } else {
              let nuevaX = (Math.random() * 4) - 2;
              let nuevaY = (Math.random() * 2) + 1;
              let nuevaZ = (Math.random() * -3) - 1;
              document.querySelector('#pieza1').setAttribute('position', `${nuevaX} ${nuevaY} ${nuevaZ}`);
          }
      }
    </script>
  </body>
</html>
