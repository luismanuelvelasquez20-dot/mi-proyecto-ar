<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Introducción - Experiencia AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse; interval: 10" raycaster="objects: .clickable" webxr="optionalFeatures: hit-test, local-floor">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#05050A"></a-sky>

      <a-entity position="0 1.8 -3">
        <a-box width="3.5" height="2" depth="0.1" color="#1A1A24" opacity="0.95"></a-box>
        <a-text value="BIENVENIDO A LA EXPERIENCIA" position="0 0.7 0.06" align="center" width="4.5" color="#FFD700" font="roboto"></a-text>
        <a-text value="En esta aventura interactiva aprenderemos como las mecanicas de juego y la tecnologia AR transforman la educacion.\n\nMueve tu dispositivo para explorar el entorno 3D." 
                position="0 -0.1 0.06" 
                align="center" 
                width="3.2" 
                color="#FFF" 
                font="roboto">
        </a-text>
      </a-entity>

      <a-entity position="0 0.5 -2.2">
        <a-box id="btnComenzar" class="clickable" width="1.8" height="0.4" depth="0.1" color="#10B981"></a-box>
        <a-text value="EMPEZAR JUEGO" align="center" position="0 0 0.06" width="3.5" color="white" font="roboto"></a-text>
      </a-entity>

      <a-entity id="avatarIntro" 
                gltf-model="#avatar" 
                position="-2.2 0 -2.8" 
                rotation="0 180 0" 
                scale="1.2 1.2 1.2" 
                animation-mixer="clip: *">
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="directional" intensity="0.5" position="-1 3 1"></a-light>
      
      <a-camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-camera>
    </a-scene>

    <script>
      // Listener táctil blindado para pasar a la Escena 8
      document.querySelector('#btnComenzar').addEventListener('click', function() {
        window.location.href = 'escena1.html';
      });
    </script>
  </body>
</html>
