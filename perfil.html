<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil del Operador - Restauradores RA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --cyan: #00f0ff;
            --gold: #ffd700;
            --red: #ff0055;
            --bg: #050510;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            padding: 20px; 
            margin: 0;
        }

        .container { max-width: 600px; margin: auto; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--cyan); 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
        }

        .header h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.5rem; letter-spacing: 2px; }

        /* ESTADÍSTICAS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: rgba(255,255,255,0.05); 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px solid rgba(0,240,255,0.2); 
        }
        .stat-card h2 { font-family: 'Orbitron'; color: var(--gold); margin: 5px 0 0 0; }

        /* BITÁCORA */
        .bitacora { 
            background: rgba(10, 10, 30, 0.8); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            max-height: 300px;
            overflow-y: auto;
        }
        .bitacora h3 { font-family: 'Orbitron'; color: var(--cyan); margin-top: 0; font-size: 1rem; }
        .entry { border-left: 2px solid var(--gold); padding-left: 15px; margin-bottom: 15px; font-style: italic; color: #aaa; }

        /* ZONA DE GESTIÓN (NUEVAS FUNCIONES) */
        .management-zone {
            margin-top: 30px;
            padding: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        .management-zone h4 { font-family: 'Orbitron'; font-size: 0.8rem; margin-top: 0; color: #888; }

        .btn {
            width: 100%; 
            padding: 12px; 
            font-family: 'Orbitron'; 
            font-weight: bold; 
            font-size: 0.8rem;
            cursor: pointer; 
            border-radius: 5px; 
            margin-bottom: 10px;
            transition: 0.3s;
            background: none;
        }

        .btn-cyan { border: 1px solid var(--cyan); color: var(--cyan); }
        .btn-cyan:hover { background: var(--cyan); color: black; box-shadow: 0 0 15px var(--cyan); }

        .btn-red { border: 1px solid var(--red); color: var(--red); }
        .btn-red:hover { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }

        .btn-nav { background: var(--cyan); color: black; border: none; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; font-weight: bold; }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="p-name">CARGANDO...</h1>
            <button class="btn-nav" onclick="location.href='menu.html'">VOLVER</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p style="margin:0; font-size: 0.8rem; color:#888;">PUNTOS XP</p>
                <h2 id="p-puntos">0</h2>
            </div>
            <div class="stat-card">
                <p style="margin:0; font-size: 0.8rem; color:#888;">RELIQUIAS</p>
                <h2 id="p-reliquias">0/3</h2>
            </div>
        </div>

        <div class="bitacora">
            <h3>BITÁCORA DE DESCUBRIMIENTOS</h3>
            <div id="p-desc">
                </div>
        </div>

        <div class="management-zone">
            <h4>SISTEMA DE ENLACE</h4>
            
            <button class="btn btn-cyan" onclick="cerrarSesion()">
                CERRAR SESIÓN DE OPERADOR
            </button>

            <button class="btn btn-red" onclick="borrarUsuario()">
                ELIMINAR IDENTIDAD PERMANENTEMENTE
            </button>
        </div>

    </div>

    <script>
        window.onload = function() {
            const user = localStorage.getItem("usuarioActivo");
            if (!user) { location.href = "index.html"; return; }

            const db = JSON.parse(localStorage.getItem("usuarios_registrados")) || {};
            const d = db[user];

            if(!d) return;

            document.getElementById("p-name").innerText = user.toUpperCase();
            document.getElementById("p-puntos").innerText = d.puntos || 0;
            
            const rels = d.logros ? Object.values(d.logros).filter(v => v).length : 0;
            document.getElementById("p-reliquias").innerText = rels + "/3";

            const container = document.getElementById("p-desc");
            if(!d.descubrimientos || d.descubrimientos.length === 0) {
                container.innerHTML = "<p style='color:#555;'>No hay datos recuperados en esta sesión.</p>";
            } else {
                d.descubrimientos.forEach(frase => {
                    container.innerHTML += `<div class="entry">"${frase}"</div>`;
                });
            }
        };

        // --- FUNCIONES DE GESTIÓN ---

        function cerrarSesion() {
            if(confirm("¿Deseas finalizar la sesión de operador?")) {
                localStorage.removeItem("usuarioActivo");
                location.href = "index.html";
            }
        }

        function borrarUsuario() {
            const user = localStorage.getItem("usuarioActivo");
            
            const confirmacion = confirm(`¡ADVERTENCIA CRÍTICA!\n\nEstás a punto de borrar al usuario "${user.toUpperCase()}".\nEsto eliminará todos tus puntos, reliquias y descubrimientos de la base de datos.\n\n¿Deseas proceder?`);

            if(confirmacion) {
                // 1. Obtener base de datos completa
                let db = JSON.parse(localStorage.getItem("usuarios_registrados")) || {};
                
                // 2. Eliminar la llave del usuario
                if(db[user]) {
                    delete db[user];
                    
                    // 3. Guardar la base de datos actualizada en el LocalStorage
                    localStorage.setItem("usuarios_registrados", JSON.stringify(db));
                    
                    // 4. Limpiar sesión activa
                    localStorage.removeItem("usuarioActivo");
                    
                    alert("Identidad eliminada correctamente del sistema.");
                    
                    // 5. Redirigir al inicio
                    location.href = "index.html";
                }
            }
        }
    </script>
</body>
</html>
