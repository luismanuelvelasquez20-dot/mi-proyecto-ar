<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil del Operador - Restauradores RA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="data.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --cyan: #00f0ff;
            --gold: #ffd700;
            --red: #ff0055;
            --bg: #050510;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            padding: 20px; 
            margin: 0;
            background-image: radial-gradient(circle at center, #0a0a20 0%, #050510 100%);
        }

        .container { max-width: 600px; margin: auto; }

        /* CABECERA */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--cyan); 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
        }

        .header h1 { font-family: 'Orbitron'; margin: 0; font-size: 1.4rem; letter-spacing: 2px; color: white; }

        .btn-nav { 
            background: var(--cyan); 
            color: black; 
            border: none; 
            padding: 10px 20px; 
            font-family: 'Orbitron'; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn-nav:hover { box-shadow: 0 0 15px var(--cyan); transform: scale(1.05); }

        /* TARJETAS DE ESTADÍSTICAS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        
        .stat-card { 
            background: rgba(255,255,255,0.05); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid rgba(0,240,255,0.2); 
            transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--cyan); background: rgba(0,240,255,0.05); }
        .stat-card p { margin: 0; font-size: 0.8rem; color: #888; font-family: 'Orbitron'; }
        .stat-card h2 { font-family: 'Orbitron'; color: var(--gold); margin: 10px 0 0 0; font-size: 1.8rem; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* BITÁCORA DE DESCUBRIMIENTOS */
        .bitacora { 
            background: rgba(10, 10, 30, 0.8); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 30px;
        }
        .bitacora h3 { font-family: 'Orbitron'; color: var(--cyan); margin-top: 0; font-size: 1rem; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .entry { 
            border-left: 3px solid var(--gold); 
            padding-left: 15px; 
            margin-bottom: 15px; 
            font-style: italic; 
            color: #ccc; 
            line-height: 1.4;
            font-size: 1.1rem;
        }

        /* ZONA DE GESTIÓN (CERRAR / BORRAR) */
        .management-zone {
            padding: 25px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 0, 0, 0.02);
        }
        .management-zone h4 { 
            font-family: 'Orbitron'; 
            font-size: 0.8rem; 
            margin-top: 0; 
            color: #666; 
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-action {
            width: 100%; 
            padding: 14px; 
            font-family: 'Orbitron'; 
            font-weight: bold; 
            font-size: 0.85rem;
            cursor: pointer; 
            border-radius: 6px; 
            margin-bottom: 12px;
            transition: 0.3s;
            background: none;
            letter-spacing: 1px;
        }

        .btn-logout { border: 1px solid var(--cyan); color: var(--cyan); }
        .btn-logout:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }

        .btn-delete { border: 1px solid var(--red); color: var(--red); }
        .btn-delete:hover { background: var(--red); color: white; box-shadow: 0 0 20px var(--red); }

        /* Scrollbar personalizada */
        .bitacora::-webkit-scrollbar { width: 6px; }
        .bitacora::-webkit-scrollbar-track { background: transparent; }
        .bitacora::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="p-name">OPERADOR</h1>
            <button class="btn-nav" onclick="location.href='menu.html'">VOLVER AL PANEL</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p>PUNTOS XP</p>
                <h2 id="p-puntos">0</h2>
            </div>
            <div class="stat-card">
                <p>RELIQUIAS</p>
                <h2 id="p-reliquias">0/3</h2>
            </div>
        </div>

        <div class="bitacora">
            <h3>BITÁCORA DE DATOS RECUPERADOS</h3>
            <div id="p-desc">
                </div>
        </div>

        <div class="management-zone">
            <h4>ADMINISTRACIÓN DE ENLACE NEURONAL</h4>
            
            <button class="btn-action btn-logout" onclick="cerrarSesion()">
                DESCONECTAR SESIÓN (LOGOUT)
            </button>

            <button class="btn-action btn-delete" onclick="borrarUsuario()">
                BORRAR IDENTIDAD PERMANENTEMENTE
            </button>
        </div>

    </div>

    <script>
        window.onload = function() {
            // Verificar si hay una sesión activa
            const user = localStorage.getItem("usuarioActivo");
            if (!user) { 
                location.href = "index.html"; 
                return; 
            }

            // Cargar base de datos y datos del usuario
            const db = JSON.parse(localStorage.getItem("usuarios_registrados")) || {};
            const d = db[user];

            if(!d) {
                alert("Error de sincronización: Identidad no encontrada.");
                location.href = "index.html";
                return;
            }

            // Inyectar datos en la UI
            document.getElementById("p-name").innerText = user.toUpperCase();
            document.getElementById("p-puntos").innerText = d.puntos || 0;
            
            // Contar reliquias activas
            const rels = d.logros ? Object.values(d.logros).filter(v => v).length : 0;
            document.getElementById("p-reliquias").innerText = rels + "/3";

            // Inyectar bitácora
            const container = document.getElementById("p-desc");
            if(!d.descubrimientos || d.descubrimientos.length === 0) {
                container.innerHTML = "<p style='color:#555; text-align:center;'>No se han registrado ecos de memoria en esta sesión.</p>";
            } else {
                // Invertimos el orden para que lo más reciente salga arriba
                [...d.descubrimientos].reverse().forEach(frase => {
                    container.innerHTML += `<div class="entry">"${frase}"</div>`;
                });
            }
        };

        // FUNCIONES DE GESTIÓN

        function cerrarSesion() {
            if(confirm("¿Deseas cerrar la sesión de operador? Tus datos se mantendrán guardados en este dispositivo.")) {
                localStorage.removeItem("usuarioActivo");
                location.href = "index.html";
            }
        }

        function borrarUsuario() {
            const user = localStorage.getItem("usuarioActivo");
            
            const msg = `¡ADVERTENCIA DE SEGURIDAD!\n\nEstás a punto de eliminar permanentemente al operador "${user.toUpperCase()}".\n\nSe perderán todos los puntos, reliquias y el historial de la bitácora.\n\n¿Confirmas la eliminación total?`;

            if(confirm(msg)) {
                // 1. Obtener la base de datos de usuarios
                let db = JSON.parse(localStorage.getItem("usuarios_registrados")) || {};
                
                // 2. Eliminar al usuario de la base de datos
                if(db[user]) {
                    delete db[user];
                    
                    // 3. Guardar la base de datos actualizada
                    localStorage.setItem("usuarios_registrados", JSON.stringify(db));
                    
                    // 4. Limpiar la sesión actual
                    localStorage.removeItem("usuarioActivo");
                    
                    alert("Identidad borrada con éxito del núcleo de datos.");
                    
                    // 5. Redirigir al inicio
                    location.href = "index.html";
                }
            }
        }
    </script>
</body>
</html>
