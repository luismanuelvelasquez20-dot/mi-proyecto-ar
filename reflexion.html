<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Reflexión Final - AR Educativa</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse; interval: 10" raycaster="objects: .clickable" webxr="optionalFeatures: hit-test, local-floor">
      
      <a-assets>
        <a-asset-item id="avatar" src="mi_avatar.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#05050A"></a-sky>

      <a-entity id="avatarReflexion" 
                gltf-model="#avatar" 
                position="-2.8 0 -3" 
                rotation="0 180 0" 
                scale="1.2 1.2 1.2" 
                animation-mixer="clip: *">
      </a-entity>

      <a-entity position="0.5 1.8 -3.5">
        <a-box width="4.5" height="2.5" depth="0.1" color="#1A1A24" opacity="0.9"></a-box>
        <a-text value="REFLEXION FINAL" position="0 1.0 0.1" align="center" width="5" color="#FFD700" font="roboto"></a-text>
        <a-text id="textoReflexion" 
                value="Selecciona un concepto de la derecha para profundizar en su impacto educativo." 
                position="-2 0 0.2" 
                align="left" 
                width="3.8" 
                color="#FFF" 
                font="roboto">
        </a-text>
      </a-entity>

      <a-entity position="3.2 1.8 -3.2">
        <a-entity position="0 0.7 0">
          <a-box id="btnActivo" class="clickable" width="2" height="0.6" depth="0.1" color="#3B82F6"></a-box>
          <a-text value="Aprendizaje Activo" align="center" position="0 0 0.06" width="3.5"></a-text>
        </a-entity>

        <a-entity position="0 0 0">
          <a-box id="btnVisual" class="clickable" width="2" height="0.6" depth="0.1" color="#10B981"></a-box>
          <a-text value="Retencion Visual" align="center" position="0 0 0.06" width="3.5"></a-text>
        </a-entity>

        <a-entity position="0 -0.7 0">
          <a-box id="btnMotivacion" class="clickable" width="2" height="0.6" depth="0.1" color="#F59E0B"></a-box>
          <a-text value="Motivacion Real" align="center" position="0 0 0.06" width="3.5"></a-text>
        </a-entity>
      </a-entity>

      <a-entity position="0 0.5 -2.5">
        <a-box id="btnAR" class="clickable" width="2.5" height="0.5" depth="0.1" color="#EF4444"></a-box>
        <a-text value="INTRODUCCION A LA AR" align="center" position="0 0 0.06" width="4"></a-text>
      </a-entity>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" intensity="0.6" position="-1 3 1"></a-light>
      
      <a-camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-camera>
    </a-scene>

    <script>
      const mensajes = {
        activo: "El APRENDIZAJE ACTIVO permite que el usuario no solo reciba informacion, sino que interactue con ella, mejorando la comprension de conceptos complejos.",
        visual: "La RETENCION VISUAL en AR es hasta un 70% mayor que en metodos tradicionales, ya que el cerebro procesa objetos 3D como experiencias reales.",
        motivacion: "La MOTIVACION REAL nace de la curiosidad. Al ver elementos digitales en su mundo fisico, el interes del estudiante aumenta exponencialmente."
      };

      const textoPrincipal = document.querySelector('#textoReflexion');

      document.querySelector('#btnActivo').addEventListener('click', function() {
        textoPrincipal.setAttribute('value', mensajes.activo);
      });

      document.querySelector('#btnVisual').addEventListener('click', function() {
        textoPrincipal.setAttribute('value', mensajes.visual);
      });

      document.querySelector('#btnMotivacion').addEventListener('click', function() {
        textoPrincipal.setAttribute('value', mensajes.motivacion);
      });

      document.querySelector('#btnAR').addEventListener('click', function() {
        window.location.href = 'introduccion_ar.html';
      });
    </script>
  </body>
</html>
