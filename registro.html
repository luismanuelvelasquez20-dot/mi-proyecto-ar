<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Operador - Restauradores RA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        body { 
            margin: 0; 
            background: #050510; 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .box { 
            background: rgba(10, 10, 30, 0.95); 
            border: 1px solid #bd00ff; 
            padding: 40px; 
            border-radius: 15px; 
            text-align: center; 
            width: 100%; 
            max-width: 350px; 
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.2); 
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            font-family: 'Orbitron'; 
            color: #bd00ff; 
            letter-spacing: 2px; 
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(189, 0, 255, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid #333; 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none; 
            font-family: 'Rajdhani';
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { 
            border-color: #bd00ff; 
            background: rgba(189, 0, 255, 0.05);
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.1);
        }

        .btn-register { 
            width: 100%; 
            padding: 15px; 
            background: transparent; 
            border: 1px solid #bd00ff; 
            color: #bd00ff; 
            font-family: 'Orbitron'; 
            cursor: pointer; 
            font-weight: bold; 
            letter-spacing: 1px;
            transition: 0.3s; 
            margin-top: 10px;
        }

        .btn-register:hover { 
            background: #bd00ff; 
            color: white; 
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.4);
        }

        .footer-link {
            margin-top: 25px;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: #bd00ff;
        }

        .footer-link b { color: #bd00ff; }
    </style>
</head>
<body>

    <div class="box">
        <h1>REGISTRO</h1>
        
        <div class="input-group">
            <label>NOMBRE DE OPERADOR</label>
            <input type="text" id="nu" placeholder="Ej: Luis_01" autocomplete="off">
        </div>

        <div class="input-group">
            <label>CÓDIGO DE ACCESO</label>
            <input type="password" id="np" placeholder="••••••••" autocomplete="off">
        </div>

        <button class="btn-register" onclick="crearCuenta()">INICIALIZAR IDENTIDAD</button>
        
        <a href="index.html" class="footer-link">¿Ya tienes una identidad? <b>Inicia sesión</b></a>
    </div>

    <script>
        function crearCuenta() {
            const u = document.getElementById("nu").value.toLowerCase().trim();
            const p = document.getElementById("np").value.trim();
            
            if(!u || !p) {
                alert("Error: El sistema requiere un nombre y un código de acceso.");
                return;
            }

            if(u.length < 3) {
                alert("El nombre de usuario debe tener al menos 3 caracteres.");
                return;
            }

            // 1. Obtener base de datos actual
            let db = JSON.parse(localStorage.getItem("usuarios_registrados")) || {};
            
            // 2. Verificar si el usuario ya existe
            if(db[u]) {
                alert("Esta identidad ya existe en la base de datos central.");
                return;
            }

            // 3. Crear el objeto de usuario con la estructura completa
            // IMPORTANTE: tutorialVisto en 'false' asegura que aparezca el manual al entrar
            db[u] = {
                contrasena: p,
                rol: "estudiante",
                puntos: 0,
                progreso: { 
                    intro: false, 
                    prueba: false, 
                    desafio: false, 
                    nucleo: false 
                },
                logros: { 
                    relic1: false, 
                    relic2: false, 
                    relic3: false 
                },
                descubrimientos: [],
                tutorialVisto: false 
            };

            // 4. Guardar en LocalStorage
            localStorage.setItem("usuarios_registrados", JSON.stringify(db));
            
            // 5. Éxito y Redirección
            alert("Identidad creada con éxito. Sincronización lista.");
            window.location.href = "index.html";
        }

        // Permitir registro al presionar Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                crearCuenta();
            }
        });
    </script>
</body>
</html>
