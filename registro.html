<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal de Identidad</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

    :root{
      --cyan:#00f0ff;
      --green:#00ffcc;
      --danger:#ff0055;
      --bg:#020208;
      --panel:rgba(10,10,25,0.92);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:20px;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top left, rgba(0,240,255,0.12), transparent 40%),
        radial-gradient(circle at bottom right, rgba(189,0,255,0.15), transparent 40%),
        var(--bg);

      color:white;
      font-family:'Rajdhani',sans-serif;
    }

    .reg-container{
      width:100%;
      max-width:450px;
      background:var(--panel);
      border:2px solid var(--green);
      border-radius:20px;
      padding:40px;
      box-shadow:
        0 0 30px rgba(0,255,204,0.15),
        inset 0 0 20px rgba(0,240,255,0.08);

      backdrop-filter:blur(10px);
    }

    h1{
      text-align:center;
      font-family:'Orbitron',sans-serif;
      color:var(--green);
      margin-bottom:30px;
      letter-spacing:2px;
      font-size:1.5rem;
    }

    .input-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:6px;
      color:var(--cyan);
      font-size:0.8rem;
      font-family:'Orbitron';
      letter-spacing:1px;
    }

    input, select{
      width:100%;
      padding:13px;
      border-radius:10px;
      border:1px solid rgba(0,255,204,0.3);
      background:rgba(255,255,255,0.05);
      color:white;
      font-size:1rem;
      outline:none;
      transition:0.3s;
    }

    input:focus,
    select:focus{
      border-color:var(--cyan);
      box-shadow:0 0 10px rgba(0,240,255,0.3);
    }

    option{
      background:#111;
      color:white;
    }

    .btn-save{
      width:100%;
      padding:15px;
      margin-top:20px;
      border:none;
      border-radius:10px;
      background:var(--green);
      color:black;
      font-family:'Orbitron';
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      letter-spacing:1px;
    }

    .btn-save:hover{
      background:white;
      box-shadow:0 0 20px var(--green);
    }

    .btn-back{
      display:block;
      text-align:center;
      margin-top:18px;
      color:#888;
      text-decoration:none;
      transition:0.3s;
    }

    .btn-back:hover{
      color:white;
    }

    #msg{
      margin-top:18px;
      text-align:center;
      font-weight:bold;
      min-height:22px;
    }

    .success{
      color:var(--green);
    }

    .error{
      color:var(--danger);
    }

  </style>
</head>

<body>

  <div class="reg-container">

    <h1>CREAR IDENTIDAD</h1>

    <div class="input-group">
      <label>NOMBRE DE USUARIO</label>
      <input
        type="text"
        id="reg-user"
        placeholder="Ej: NeoCoder"
        maxlength="15"
      >
    </div>

    <div class="input-group">
      <label>CÓDIGO SECRETO</label>
      <input
        type="password"
        id="reg-pass"
        placeholder="Mínimo 4 caracteres"
      >
    </div>

    <div class="input-group">
      <label>ROL DEL OPERADOR</label>

      <select id="reg-rol">
        <option value="Estudiante">Estudiante</option>
        <option value="Profesor">Profesor</option>
        <option value="Invitado">Invitado</option>
        <option value="Administrador">Administrador</option>
      </select>
    </div>

    <button class="btn-save" onclick="guardarHeroe()">
      REGISTRAR IDENTIDAD
    </button>

    <a href="index.html" class="btn-back">
      ← Volver al portal
    </a>

    <div id="msg"></div>

  </div>

  <script>

    function mostrarMensaje(texto, tipo){

      const msg = document.getElementById("msg");

      msg.className = tipo;
      msg.innerText = texto;
    }

    function guardarHeroe(){

      const usuario = document
        .getElementById("reg-user")
        .value
        .trim()
        .toLowerCase();

      const password = document
        .getElementById("reg-pass")
        .value
        .trim();

      const rol = document
        .getElementById("reg-rol")
        .value;

      // VALIDACIONES

      if(usuario.length < 3){
        mostrarMensaje(
          "El usuario debe tener mínimo 3 caracteres.",
          "error"
        );
        return;
      }

      if(password.length < 4){
        mostrarMensaje(
          "La contraseña debe tener mínimo 4 caracteres.",
          "error"
        );
        return;
      }

      // SOLO LETRAS Y NÚMEROS

      const regex = /^[a-zA-Z0-9_]+$/;

      if(!regex.test(usuario)){
        mostrarMensaje(
          "Solo se permiten letras, números y guiones bajos.",
          "error"
        );
        return;
      }

      // BASE DE DATOS LOCAL

      let usuarios = JSON.parse(
        localStorage.getItem("usuarios_registrados")
      ) || {};

      // VALIDAR DUPLICADOS

      if(usuarios[usuario]){

        mostrarMensaje(
          "Esa identidad ya existe.",
          "error"
        );

        return;
      }

      // CREAR USUARIO

      usuarios[usuario] = {

        contrasena: password,
        rol: rol,

        creado: new Date().toLocaleString(),

        progreso:{
          intro:false,
          desafio:false,
          prueba:false,
          nucleo:false
        },

        descubrimientos:[]
      };

      // GUARDAR

      localStorage.setItem(
        "usuarios_registrados",
        JSON.stringify(usuarios)
      );

      mostrarMensaje(
        "Identidad creada correctamente.",
        "success"
      );

      // LIMPIAR CAMPOS

      document.getElementById("reg-user").value = "";
      document.getElementById("reg-pass").value = "";

      // REDIRECCIÓN

      setTimeout(() => {

        window.location.href = "index.html";

      }, 1800);
    }

  </script>

</body>
</html>
